<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="x" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  <!-- V -->
  <text x="28" y="78" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#x)">V</text>
  <!-- X -->
  <text x="64" y="85" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#e94560">X</text>
  <!-- 小装饰 -->
  <circle cx="100" cy="20" r="3" fill="#00d2ff" opacity="0.6"/>
  <circle cx="20" cy="100" r="2" fill="#e94560" opacity="0.4"/>
  <circle cx="110" cy="100" r="2" fill="#00d2ff" opacity="0.3"/>
</svg>
